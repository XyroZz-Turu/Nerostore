<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nero Store</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
transition:1s;
}

/* VIDEO */
#introVideo{
position:fixed;
top:50%;
left:50%;
height:100vh;
width:calc(100vh * 9 / 16);
transform:translate(-50%,-50%);
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:-1;
}

/* TITLE */
.title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#d580ff;
font-size:28px;
text-shadow:0 0 20px #a855ff;
opacity:0;
transition:1s;
}

.welcome{
top:35%;
}

.store{
top:45%;
font-size:22px;
letter-spacing:3px;
}

.title.show{
opacity:1;
}

/* ENTER */
.enter{
position:absolute;
bottom:80px;
padding:15px 40px;
border:1px solid #8a2eff;
border-radius:15px;
background:rgba(30,0,60,.6);
color:#d580ff;
font-size:18px;
cursor:pointer;
opacity:0;
transition:.5s;
box-shadow:0 0 20px #8a2eff;
}

.enter.show{
opacity:1;
}

</style>
</head>

<body>

<video autoplay muted playsinline id="introVideo">
<source src="b1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="title welcome" id="welcome">WELCOME</div>
<div class="title store" id="store">NERO STORE</div>

<div class="enter" id="enterBtn" onclick="goHome()">ENTER</div>

<audio id="bgm" loop>
<source src="angelbaby.mp3" type="audio/mpeg">
</audio>

<script>
const video = document.getElementById("introVideo");
const enterBtn = document.getElementById("enterBtn");
const welcome = document.getElementById("welcome");
const store = document.getElementById("store");
const music = document.getElementById("bgm");

video.addEventListener("ended",showUI);
setTimeout(showUI,3000);

function showUI(){
enterBtn.classList.add("show");
welcome.classList.add("show");
store.classList.add("show");
}

function goHome(){

music.play();

localStorage.setItem("musicPlaying","true");
localStorage.setItem("musicTime", music.currentTime);

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="home.html";
},600);

}
</script>
